# Build Server in Cloud Build then deploy
# Don't rely on pre-built JAR

steps:
  # Build the JAR using gradle
  - name: 'gradle:8.13-jdk25'
    args:
      - 'gradle', ':server:shadowJar', '--no-daemon', '-p', '/workspace'

  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/where-loc/where-chat-server:latest'
      - '-f'
      - 'server/Dockerfile'
      - '-c'
      - '/workspace'

  # Push image
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/where-loc/where-chat-server:latest'

  # Deploy to Cloud Run  
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'where-chat-server'
      - '--image'
      - 'gcr.io/where-loc/where-chat-server:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'

images:
  - 'gcr.io/where-loc/where-chat-server:latest'

options:
  logging: CLOUD_LOGGING_ONLY