steps:
  # Build Node.js server from server/ directory
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/where-loc/where-chat-server-node:$BUILD_ID', '-t', 'us-central1-docker.pkg.dev/where-loc/where-chat-server-node:latest', '-f', 'server/Dockerfile', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/where-loc/where-chat-server-node:$BUILD_ID']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/where-loc/where-chat-server-node:latest']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'where-chat-server-node'
      - '--image'
      - 'us-central1-docker.pkg.dev/where-loc/where-chat-server-node:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '2'
      - '--port'
      - '8080'
      - '--ingress'
      - 'all'

options:
  logging: CLOUD_LOGGING_ONLY