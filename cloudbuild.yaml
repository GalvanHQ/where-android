steps:
  - name: 'gcr.io/cloud-builders/gsutil'
    args: ['cp', 'gs://where-loc-server-artifacts/server-all.jar', '/workspace/server-all.jar']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/where-loc/where-chat-server/server:$BUILD_ID', '-t', 'us-central1-docker.pkg.dev/where-loc/where-chat-server/server:latest', '-f', 'server/Dockerfile', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/where-loc/where-chat-server/server:$BUILD_ID']
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/where-loc/where-chat-server/server:latest']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'where-chat-server'
      - '--image'
      - 'us-central1-docker.pkg.dev/where-loc/where-chat-server/server:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--port'
      - '8080'
      - '--service-account'
      - '1025951597272-compute@developer.gserviceaccount.com'
      - '--set-env-vars'
      - 'GOOGLE_CLOUD_PROJECT=where-loc'

options:
  logging: CLOUD_LOGGING_ONLY