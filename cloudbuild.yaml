steps:
  # Step 1: Build Docker image (latest tag only, layered cache from previous build)
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '--cache-from'
      - 'us-central1-docker.pkg.dev/where-loc/where-chat-server-node/where-chat-server-node:latest'
      - '-t'
      - 'us-central1-docker.pkg.dev/where-loc/where-chat-server-node/where-chat-server-node:latest'
      - '-f'
      - 'Dockerfile'
      - '.'

  # Step 2: Push image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/where-loc/where-chat-server-node/where-chat-server-node:latest']

  # Step 3: Deploy to Cloud Run
  #
  # Tuning notes:
  #   • memory 512Mi  — Socket.IO + Firestore listeners + LRU caches push
  #     RSS to ~180 MB under modest load; 256 MB triggered OOM-style restarts
  #     on chat bursts. 512 MB gives stable headroom.
  #   • cpu 1, concurrency 80 — Node single-threaded, but I/O-bound; one CPU
  #     handles 80 sockets comfortably. Past that, autoscaling spreads load.
  #   • min-instances 1 — eliminates cold starts on chat / location traffic.
  #     Cloud Run keeps the JVM/Node warm; this is the single biggest user-
  #     observable latency win.
  #   • max-instances 10 — doubled from 5 to absorb event spikes (group
  #     announcements, geo-fan-out) without throttling new sockets.
  #   • timeout 3600 — Socket.IO long-poll fallback can hold a request open
  #     up to an hour; keep parity with the LB.
  #   • cpu-boost — start-up latency boost so the first request after a
  #     scale-out doesn't pay double cold-start cost.
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'where-chat-server-node'
      - '--image'
      - 'us-central1-docker.pkg.dev/where-loc/where-chat-server-node/where-chat-server-node:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--cpu-boost'
      - '--port'
      - '8080'
      - '--ingress'
      - 'all'
      - '--timeout'
      - '3600'
      - '--min-instances'
      - '1'
      - '--max-instances'
      - '10'
      - '--concurrency'
      - '80'
      - '--session-affinity'
      # Use --update-env-vars (not --set-env-vars) so we only manage the
      # vars listed here and don't accidentally clobber out-of-band secrets
      # like GOOGLE_ROUTES_API_KEY. That key is set on the service via
      # `gcloud run services update --update-env-vars=GOOGLE_ROUTES_API_KEY=...`
      # and lives outside source control.
      - '--update-env-vars'
      - 'NODE_ENV=production,REST_RATE_LIMIT=300'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'
