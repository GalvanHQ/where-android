steps:
  # Copy server files from server/ to root for Docker build
  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - 'cp server/index.js . && cp -r server/src . && cp server/package.json . && cp server/package-lock.json .'

  # Build Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/where-loc/where-chat-server-node:$BUILD_ID', '-t', 'us-central1-docker.pkg.dev/where-loc/where-chat-server-node:latest', '.']

  # Push image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/where-loc/where-chat-server-node:$BUILD_ID']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/where-loc/where-chat-server-node:latest']

  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'where-chat-server-node'
      - '--image'
      - 'us-central1-docker.pkg.dev/where-loc/where-chat-server-node:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '2'
      - '--port'
      - '8080'
      - '--ingress'
      - 'all'

options:
  logging: CLOUD_LOGGING_ONLY