# Cloud Build for Server - uses existing deployment
# When a working image is created, this will deploy it

steps:
  # Just deploy the existing placeholder until fix
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'where-chat-server'
      - '--service-account'
      - '1025951597272-compute@developer.gserviceaccount.com'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--no-cached'
      - '--port'
      - '8080'

options:
  logging: CLOUD_LOGGING_ONLY