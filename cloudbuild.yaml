# Google Cloud Build - deploy from pre-built JAR
# Uses the JAR that already exists from previous local build

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/where-loc/where-chat-server:latest'
      - '-f'
      - 'server/Dockerfile'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/where-loc/where-chat-server:latest'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'where-chat-server'
      - '--image'
      - 'gcr.io/where-loc/where-chat-server:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'

images:
  - 'gcr.io/where-loc/where-chat-server:latest'

options:
  logging: CLOUD_LOGGING_ONLY