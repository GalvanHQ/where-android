steps:
  # Step 1: Build Docker image from server/ directory (latest tag only)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'us-central1-docker.pkg.dev/where-loc/where-chat-server-node/where-chat-server-node:latest', 'server']

  # Step 2: Push image (latest tag only — no accumulating build ID tags)
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'us-central1-docker.pkg.dev/where-loc/where-chat-server-node/where-chat-server-node:latest']

  # Step 3: Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'where-chat-server-node'
      - '--image'
      - 'us-central1-docker.pkg.dev/where-loc/where-chat-server-node/where-chat-server-node:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '256Mi'
      - '--cpu'
      - '1'
      - '--port'
      - '8080'
      - '--ingress'
      - 'all'
      - '--timeout'
      - '3600'
      - '--min-instances'
      - '0'
      - '--max-instances'
      - '5'
      - '--concurrency'
      - '80'

options:
  logging: CLOUD_LOGGING_ONLY