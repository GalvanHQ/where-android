# Build Server in Cloud Build using Artifact Registry

steps:
  # Build JAR - try alternative build approach
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'run', '--rm',
      '-v', '/workspace:/workspace',
      '-w', '/workspace',
      'gradle:8.13-jdk25',
      'gradle', ':server:shadowJar', '--no-daemon'

  # Build Docker using standard builder with workspace volume
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'us-central1-docker.pkg.dev/where-loc/where-chat-server/where-chat-server:latest'
      - '-f'
      - 'server/Dockerfile'
      - '.'

  # Push to Artifact Registry
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'us-central1-docker.pkg.dev/where-loc/where-chat-server/where-chat-server:latest'

  # Deploy from Artifact Registry
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'where-chat-server'
      - '--image'
      - 'us-central1-docker.pkg.dev/where-loc/where-chat-server/where-chat-server:latest'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'

images:
  - 'us-central1-docker.pkg.dev/where-loc/where-chat-server/where-chat-server:latest'

options:
  logging: CLOUD_LOGGING_ONLY