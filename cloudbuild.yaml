# Google Cloud Build for Ktor Server
# Deploys from source using Cloud Run's built-in builder

steps:
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'where-chat-server'
      - '--source'
      - 'server/'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'
      - '--memory'
      - '512Mi'
      - '--cpu'
      - '1'
      - '--runtime'
      - 'java21'
      - '--env-vars'
      - 'PORT=8080'

options:
  logging: CLOUD_LOGGING_ONLY