# Simple test build

steps:
  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'build'
      - '-t'
      - 'gcr.io/where-loc/where-chat-server:test'
      - '-f'
      - 'server/Dockerfile'
      - '.'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      - 'push'
      - 'gcr.io/where-loc/where-chat-server:test'

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'where-chat-server'
      - '--image'
      - 'gcr.io/where-loc/where-chat-server:test'
      - '--region'
      - 'us-central1'
      - '--platform'
      - 'managed'
      - '--allow-unauthenticated'

images:
  - 'gcr.io/where-loc/where-chat-server:test'

options:
  logging: CLOUD_LOGGING_ONLY